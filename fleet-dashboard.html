<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Leak Hounds Fleet</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
  :root {
    --navy-dark: #2a2542;
    --orange:    #D14124;
    --cream:     #D9C89E;
    --teal:      #94B7BB;
    --bg:        #18162a;
    --panel:     #1e1b35;
    --panel2:    #252246;
    --border:    #3a3460;
    --green:     #3ddc84;
    --yellow:    #f5c842;
    --red:       #e84040;
    --text:      #ffffff;
    --text2:     #d0cce8;
    --muted:     #8880aa;
    --font-head: 'Barlow Condensed', sans-serif;
    --font-body: 'Barlow', sans-serif;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  html,body { width:100%; height:100%; background:var(--bg); color:var(--text); font-family:var(--font-body); overflow:hidden; }
  .shell { display:flex; flex-direction:column; width:100vw; height:100vh; }

  /* HEADER */
  .header { display:flex; align-items:center; justify-content:space-between; padding:0 22px; height:56px; background:var(--navy-dark); border-bottom:3px solid var(--orange); flex-shrink:0; }
  .logo { display:flex; align-items:baseline; gap:12px; }
  .logo-text { font-family:var(--font-head); font-weight:900; font-size:28px; letter-spacing:0.06em; text-transform:uppercase; color:#fff; }
  .logo-text em { font-style:normal; color:var(--orange); }
  .logo-sub { font-family:var(--font-head); font-size:14px; font-weight:700; letter-spacing:0.2em; text-transform:uppercase; color:var(--cream); opacity:0.6; }
  .header-right { display:flex; align-items:center; gap:24px; }
  .clock { font-family:var(--font-head); font-size:24px; font-weight:700; letter-spacing:0.1em; color:#fff; }
  .live-badge { display:flex; align-items:center; gap:7px; font-family:var(--font-head); font-size:13px; font-weight:700; letter-spacing:0.14em; text-transform:uppercase; color:var(--green); background:rgba(61,220,132,0.12); border:1px solid rgba(61,220,132,0.35); padding:5px 14px; border-radius:20px; }
  .live-dot { width:7px; height:7px; border-radius:50%; background:var(--green); animation:pulse 1.6s infinite; }
  @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.3;transform:scale(0.6)} }

  /* MAIN */
  .main { display:flex; flex:1; min-height:0; }

  /* MAP */
  .map-panel { flex:1.3; position:relative; }
  #map { width:100%; height:100%; }
  .map-overlay { position:absolute; top:12px; left:12px; z-index:1000; background:rgba(24,22,42,0.92); border:1px solid var(--border); border-left:3px solid var(--orange); border-radius:4px; padding:8px 14px; font-family:var(--font-head); font-size:14px; font-weight:600; letter-spacing:0.06em; color:var(--text2); backdrop-filter:blur(8px); }
  .map-overlay b { color:#fff; font-weight:900; }

  /* RIGHT PANEL */
  .right-panel { width:440px; display:flex; flex-direction:column; background:var(--panel); border-left:2px solid var(--border); flex-shrink:0; overflow:hidden; }

  /* Summary */
  .summary-bar { display:grid; grid-template-columns:repeat(3,1fr); gap:1px; background:var(--border); border-bottom:2px solid var(--border); flex-shrink:0; }
  .stat-block { background:var(--panel2); padding:12px 16px; text-align:center; }
  .stat-num { font-family:var(--font-head); font-size:36px; font-weight:900; line-height:1; }
  .stat-label { font-family:var(--font-head); font-size:11px; font-weight:700; letter-spacing:0.14em; text-transform:uppercase; color:var(--muted); margin-top:2px; }
  .s-moving .stat-num { color:var(--green); }
  .s-parked .stat-num { color:var(--teal); }
  .s-alert  .stat-num { color:var(--yellow); }

  /* Section head */
  .section-head { padding:10px 16px 8px; font-family:var(--font-head); font-size:12px; font-weight:700; letter-spacing:0.16em; text-transform:uppercase; color:var(--muted); border-bottom:1px solid var(--border); flex-shrink:0; }

  /* Vehicle list */
  .vehicle-list { flex:1; overflow-y:auto; scrollbar-width:thin; scrollbar-color:var(--border) transparent; }

  .vc { border-bottom:1px solid var(--border); padding:14px 16px; border-left:4px solid transparent; }
  .vc.moving-card { border-left-color:var(--green); }
  .vc.parked-card  { border-left-color:var(--teal); }
  .vc.idle-card    { border-left-color:var(--yellow); }

  .vc-top { display:flex; align-items:center; justify-content:space-between; margin-bottom:3px; }
  .vc-name { font-family:var(--font-head); font-size:20px; font-weight:900; color:#fff; letter-spacing:0.04em; }

  .pill { font-family:var(--font-head); font-size:12px; font-weight:700; letter-spacing:0.1em; text-transform:uppercase; padding:3px 10px; border-radius:20px; }
  .pill-moving { background:rgba(61,220,132,0.15); color:var(--green); border:1px solid rgba(61,220,132,0.4); }
  .pill-parked  { background:rgba(148,183,187,0.15); color:var(--teal);  border:1px solid rgba(148,183,187,0.4); }
  .pill-idle    { background:rgba(245,200,66,0.15);  color:var(--yellow);border:1px solid rgba(245,200,66,0.4); }

  .vc-addr { font-size:12px; font-weight:600; color:var(--text2); margin-bottom:10px; }

  /* Maintenance rows */
  .vc-maint { display:flex; flex-direction:column; gap:6px; }
  .maint-row { display:flex; align-items:center; gap:8px; }
  .maint-label { font-family:var(--font-head); font-size:12px; font-weight:700; letter-spacing:0.07em; text-transform:uppercase; color:var(--text2); width:106px; flex-shrink:0; }
  .maint-bar-wrap { flex:1; height:6px; background:rgba(255,255,255,0.08); border-radius:3px; overflow:hidden; }
  .maint-bar { height:100%; border-radius:3px; transition:width 0.6s ease; }
  .maint-status { font-family:var(--font-head); font-size:13px; font-weight:900; letter-spacing:0.08em; width:52px; text-align:right; flex-shrink:0; }

  /* Battery row — special */
  .battery-row { display:flex; align-items:center; gap:8px; }
  .battery-label { font-family:var(--font-head); font-size:12px; font-weight:700; letter-spacing:0.07em; text-transform:uppercase; color:var(--text2); width:106px; flex-shrink:0; }
  .battery-bar-wrap { flex:1; height:6px; background:rgba(255,255,255,0.08); border-radius:3px; overflow:hidden; }
  .battery-bar { height:100%; border-radius:3px; }
  .battery-val { font-family:var(--font-head); font-size:13px; font-weight:900; letter-spacing:0.06em; width:52px; text-align:right; flex-shrink:0; }

  .ok     { color:var(--green); }
  .warn   { color:var(--yellow); }
  .urgent { color:var(--red); }

  /* Footer */
  .footer { padding:7px 16px; border-top:1px solid var(--border); font-size:11px; font-weight:600; color:var(--muted); letter-spacing:0.05em; text-align:center; flex-shrink:0; }
  .api-mode { color:var(--yellow); }
  .api-mode.live  { color:var(--green); }
  .api-mode.error { color:var(--red); }
</style>
</head>
<body>
<div class="shell">
  <header class="header">
    <div class="logo">
      <div class="logo-text"><em>LEAK</em>HOUNDS</div>
      <div class="logo-sub">Fleet</div>
    </div>
    <div class="header-right">
      <div class="live-badge"><div class="live-dot"></div>Live</div>
      <div class="clock" id="clock">--:-- --</div>
    </div>
  </header>

  <div class="main">
    <div class="map-panel">
      <div id="map"></div>
      <div class="map-overlay"><b id="map-count">—</b> vehicles &nbsp;·&nbsp; updated <b id="last-upd">just now</b></div>
    </div>

    <div class="right-panel">
      <div class="summary-bar">
        <div class="stat-block s-moving"><div class="stat-num" id="cnt-m">0</div><div class="stat-label">Moving</div></div>
        <div class="stat-block s-parked"><div class="stat-num" id="cnt-p">0</div><div class="stat-label">Parked</div></div>
        <div class="stat-block s-alert"> <div class="stat-num" id="cnt-a">0</div><div class="stat-label">Alerts</div></div>
      </div>
      <div class="section-head">Vehicles &amp; Maintenance</div>
      <div class="vehicle-list" id="vlist"></div>
      <div class="footer">Bouncie API &nbsp;·&nbsp; <span class="api-mode" id="api-mode">Connecting...</span> &nbsp;·&nbsp; auto-refreshes every 15s</div>
    </div>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
//  YOUR API KEY
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const API_KEY = '6y3oxgj7yRjM7qSxMj6IuL7aDqElIpSs9z0IP2oZ243bzFxV2G';
const POLL_MS = 15000;

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
//  MAINTENANCE CONFIG
//  Set due_miles for each item per your schedule.
//  These apply to all vehicles — adjust per truck below if needed.
//  Battery is read live from Bouncie (voltage).
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const MAINT_CONFIG = [
  { key:'oil',   label:'Oil Change',    interval: 5000  }, // every 5,000 mi
  { key:'tires', label:'Tire Rotation', interval: 7500  }, // every 7,500 mi
  { key:'brake', label:'Brake Inspect', interval: 20000 }, // every 20,000 mi
  { key:'smog',  label:'Smog / Reg',    interval: 24000 }, // every ~2 yrs / 24k mi
];

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
//  LAST SERVICE MILEAGE PER VEHICLE
//  Fill in actual last-serviced mileage for each truck.
//  Key = vehicle IMEI or nickName (must match Bouncie exactly).
//  If a vehicle isn't listed here, bars show as unknown.
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const LAST_SERVICE = {
  // Example entries — replace with your real truck names & mileages:
  // 'Truck 1': { oil: 85000, tires: 82000, brake: 70000, smog: 80000 },
  // 'Truck 2': { oil: 59000, tires: 55000, brake: 40000, smog: 50000 },
};

// Battery voltage thresholds
const BATT_OK   = 12.6;  // green above this
const BATT_WARN = 12.2;  // yellow above this
// below BATT_WARN = red

function batteryStatus(v) {
  if (v >= BATT_OK)   return 'ok';
  if (v >= BATT_WARN) return 'warn';
  return 'urgent';
}
function batteryPct(v) {
  // 11.5V = empty, 12.8V = full
  return Math.max(0, Math.min(1, (v - 11.5) / (12.8 - 11.5)));
}

function maintForVehicle(name, odometer) {
  const svc = LAST_SERVICE[name] || {};
  return MAINT_CONFIG.map(m => {
    const last = svc[m.key];
    if (!last || !odometer) return { label:m.label, s:'ok', p:0.5, note:'—' };
    const milesSince = odometer - last;
    const pct = milesSince / m.interval;             // 0 = just done, 1 = due now
    const remaining = m.interval - milesSince;
    const s = pct >= 1 ? 'urgent' : pct >= 0.8 ? 'warn' : 'ok';
    const barPct = Math.max(0.04, 1 - pct);          // bar shrinks as due date approaches
    const note = remaining <= 0
      ? `${Math.abs(remaining).toLocaleString()} mi overdue`
      : `${remaining.toLocaleString()} mi left`;
    return { label:m.label, s, p:barPct, note };
  });
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
//  MOCK DATA (shown until live API connects)
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const MOCK = [
  { id:'v1', name:'Truck 1', lat:34.1336, lng:-117.9073, status:'moving', speed:38, address:'Foothill Blvd, Azusa',  odometer:87420,  battery:12.7,
    maint:[{label:'Oil Change',s:'ok',p:0.82},{label:'Tire Rotation',s:'warn',p:0.28},{label:'Brake Inspect',s:'ok',p:0.65},{label:'Smog / Reg',s:'ok',p:0.70}] },
  { id:'v2', name:'Truck 2', lat:34.0922, lng:-117.8672, status:'parked', speed:0,  address:'Arrow Hwy, Covina',     odometer:61100,  battery:12.1,
    maint:[{label:'Oil Change',s:'ok',p:0.70},{label:'Tire Rotation',s:'ok',p:0.55},{label:'Brake Inspect',s:'urgent',p:0.04},{label:'Smog / Reg',s:'warn',p:0.30}] },
  { id:'v3', name:'Truck 3', lat:34.1482, lng:-117.8543, status:'moving', speed:54, address:'I-210 W, Glendora',     odometer:44800,  battery:12.6,
    maint:[{label:'Oil Change',s:'ok',p:0.60},{label:'Tire Rotation',s:'ok',p:0.75},{label:'Brake Inspect',s:'ok',p:0.90},{label:'Smog / Reg',s:'ok',p:0.80}] },
  { id:'v4', name:'Truck 4', lat:34.1109, lng:-117.9301, status:'idle',   speed:0,  address:'Todd Ave, Azusa',       odometer:103200, battery:11.9,
    maint:[{label:'Oil Change',s:'warn',p:0.25},{label:'Tire Rotation',s:'warn',p:0.20},{label:'Brake Inspect',s:'ok',p:0.50},{label:'Smog / Reg',s:'urgent',p:0.0}] }
];

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
//  BOUNCIE API (tries direct, then 2 proxies)
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const ENDPOINTS = [
  'https://api.bouncie.dev/v1/vehicles',
  'https://corsproxy.io/?https://api.bouncie.dev/v1/vehicles',
  'https://api.allorigins.win/raw?url=https://api.bouncie.dev/v1/vehicles'
];

async function fetchLive() {
  let lastErr;
  for (const url of ENDPOINTS) {
    try {
      const r = await fetch(url, { headers:{ 'Authorization': API_KEY } });
      if (!r.ok) throw new Error(`HTTP ${r.status}`);
      const data = await r.json();
      if (!Array.isArray(data)) throw new Error('Bad response');
      return data.map(v => {
        const name     = v.nickName || v.hardwareSerial || 'Vehicle';
        const odometer = Math.round(v.stats?.odometer || 0);
        const battery  = v.stats?.battery?.batteryVoltage || null;
        return {
          id:       v.imei,
          name,
          lat:      v.stats?.location?.lat,
          lng:      v.stats?.location?.lon,
          status:   v.stats?.isRunning ? 'moving' : 'parked',
          speed:    Math.round(v.stats?.speed || 0),
          address:  v.stats?.location?.address || '—',
          odometer,
          battery,
          maint:    maintForVehicle(name, odometer)
        };
      });
    } catch(e) { lastErr = e; console.warn('Endpoint failed:', url, e.message); }
  }
  throw lastErr;
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
//  MAP
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const map = L.map('map',{zoomControl:false,attributionControl:false}).setView([34.12,-117.88],11);
L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png',{
  maxZoom:19, subdomains:'abcd'
}).addTo(map);
L.control.zoom({position:'bottomright'}).addTo(map);

const SC={moving:'#3ddc84',parked:'#94B7BB',idle:'#f5c842'};
const SE={moving:'🚚',parked:'🅿',idle:'⏸'};
const markers={};

function mkIcon(v){
  const c=SC[v.status]||'#aaa', e=SE[v.status]||'🚗';
  const n=v.name.split('—')[0].trim();
  return L.divIcon({
    className:'',
    html:`<div style="text-align:center;width:50px">
      <div style="width:42px;height:42px;border-radius:50%;background:rgba(255,255,255,0.97);border:3px solid ${c};display:flex;align-items:center;justify-content:center;font-size:18px;box-shadow:0 2px 12px rgba(0,0,0,0.3);margin:auto">${e}</div>
      <div style="font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:800;color:#111;background:rgba(255,255,255,0.93);border-radius:3px;padding:1px 5px;white-space:nowrap;margin-top:2px;box-shadow:0 1px 4px rgba(0,0,0,0.25)">${n}</div>
    </div>`,
    iconSize:[50,62],iconAnchor:[25,44]
  });
}

function placeMarkers(veh){
  veh.forEach(v=>{
    if(!v.lat||!v.lng) return;
    if(markers[v.id]){ markers[v.id].setLatLng([v.lat,v.lng]); markers[v.id].setIcon(mkIcon(v)); }
    else { markers[v.id]=L.marker([v.lat,v.lng],{icon:mkIcon(v)}).addTo(map)
      .bindPopup(`<b>${v.name}</b><br>${v.address}${v.status==='moving'?`<br>🏎 ${v.speed} mph`:''}`); }
  });
  const ll=veh.filter(v=>v.lat&&v.lng).map(v=>[v.lat,v.lng]);
  if(ll.length>1) map.fitBounds(ll,{padding:[60,60]});
  else if(ll.length===1) map.setView(ll[0],14);
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
//  RENDER LIST
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const barColor  = s => s==='urgent'?'#e84040':s==='warn'?'#f5c842':'#3ddc84';
const statLabel = s => s==='urgent'?'⚠ NOW':s==='warn'?'SOON':'OK';

function renderList(veh){
  let moving=0,parked=0,alerts=0;
  document.getElementById('vlist').innerHTML = veh.map(v => {
    if(v.status==='moving') moving++; else parked++;
    const hasAlert = (v.maint||[]).some(m=>m.s!=='ok') ||
                     (v.battery !== null && v.battery < BATT_WARN);
    if(hasAlert) alerts++;

    const maintHTML = (v.maint||[]).map(m=>`
      <div class="maint-row">
        <div class="maint-label">${m.label}</div>
        <div class="maint-bar-wrap"><div class="maint-bar" style="width:${Math.max(4,m.p*100)}%;background:${barColor(m.s)}"></div></div>
        <div class="maint-status ${m.s}">${statLabel(m.s)}</div>
      </div>`).join('');

    // Battery row
    let battHTML = '';
    if (v.battery !== null && v.battery !== undefined) {
      const bs  = batteryStatus(v.battery);
      const bp  = batteryPct(v.battery);
      const bc  = barColor(bs);
      battHTML = `<div class="battery-row">
        <div class="battery-label">⚡ Battery</div>
        <div class="battery-bar-wrap"><div class="battery-bar" style="width:${Math.max(4,bp*100)}%;background:${bc}"></div></div>
        <div class="battery-val ${bs}">${v.battery.toFixed(1)}V</div>
      </div>`;
    } else {
      battHTML = `<div class="battery-row">
        <div class="battery-label">⚡ Battery</div>
        <div class="battery-bar-wrap"><div class="battery-bar" style="width:50%;background:#555"></div></div>
        <div class="battery-val" style="color:var(--muted)">—</div>
      </div>`;
    }

    return `<div class="vc ${v.status}-card">
      <div class="vc-top">
        <div class="vc-name">${v.name}</div>
        <div class="pill pill-${v.status}">${v.status}${v.status==='moving'?' · '+v.speed+' mph':''}</div>
      </div>
      <div class="vc-addr">📍 ${v.address} &nbsp;·&nbsp; 📏 ${v.odometer.toLocaleString()} mi</div>
      <div class="vc-maint">
        ${maintHTML}
        ${battHTML}
      </div>
    </div>`;
  }).join('');

  document.getElementById('cnt-m').textContent = moving;
  document.getElementById('cnt-p').textContent = parked;
  document.getElementById('cnt-a').textContent = alerts;
  document.getElementById('map-count').textContent = veh.length;
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
//  CLOCK
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
let sec=0;
function tick(){
  document.getElementById('clock').textContent=
    new Date().toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',hour12:true});
  sec++;
  document.getElementById('last-upd').textContent=sec<60?`${sec}s ago`:`${Math.floor(sec/60)}m ago`;
}
setInterval(tick,1000); tick();

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
//  MAIN LOOP
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
let veh = MOCK;
async function refresh(){
  try {
    const live = await fetchLive();
    if(live && live.length){
      veh = live;
      document.getElementById('api-mode').textContent = 'LIVE — Bouncie connected ✓';
      document.getElementById('api-mode').className = 'api-mode live';
    }
  } catch(e) {
    document.getElementById('api-mode').textContent = veh===MOCK
      ? 'Cannot reach Bouncie API — showing demo data'
      : 'API error — showing last known positions';
    document.getElementById('api-mode').className = 'api-mode error';
  }
  placeMarkers(veh);
  renderList(veh);
  sec=0;
}

refresh();
setInterval(refresh, POLL_MS);
</script>
</body>
</html>
